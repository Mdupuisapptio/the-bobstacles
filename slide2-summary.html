<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #F4F6F6;
  font-family: Arial, sans-serif;
  display: flex;
}
.header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 60pt;
  background: #1C2833;
  display: flex;
  align-items: center;
  padding: 0 30pt;
}
.header h1 {
  color: #ffffff;
  font-size: 28pt;
  font-weight: bold;
  margin: 0;
}
.content {
  margin-top: 70pt;
  padding: 0 30pt 30pt 30pt;
  width: 100%;
}
.summary-box {
  background: #ffffff;
  padding: 12pt;
  border-radius: 8pt;
  margin-bottom: 12pt;
  border-left: 6pt solid #5EA8A7;
}
.summary-box h2 {
  color: #1C2833;
  font-size: 16pt;
  margin: 0 0 8pt 0;
  font-weight: bold;
}
.metric {
  display: flex;
  justify-content: space-between;
  margin: 6pt 0;
  font-size: 12pt;
}
.metric-label {
  color: #2E4053;
  font-weight: bold;
}
.metric-value {
  color: #1C2833;
  font-weight: bold;
}
.positive {
  color: #27AE60;
}
.chart-placeholder {
  width: 100%;
  height: 130pt;
  background: #E8F4F8;
  border-radius: 8pt;
}
</style>
</head>
<body>
<div class="header">
  <h1>Executive Summary</h1>
</div>
<div class="content">
  <div class="summary-box">
    <h2>Overall Cost Comparison</h2>
    <div class="metric">
      <p class="metric-label">Current Period (May 17 - Jun 16):</p>
      <p class="metric-value">$12,632,887</p>
    </div>
    <div class="metric">
      <p class="metric-label">Previous Period (Apr 17 - May 16):</p>
      <p class="metric-value">$12,377,556</p>
    </div>
    <div class="metric">
      <p class="metric-label">Change:</p>
      <p class="metric-value positive">+$255,331 (+2.1%)</p>
    </div>
  </div>
  <div id="chart" class="chart-placeholder placeholder"></div>
</div>
</body>
</html>
